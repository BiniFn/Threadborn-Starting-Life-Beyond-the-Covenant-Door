<!DOCTYPE html>
<html lang="en">
<head>
  <script>
    (function() {
      try {
        var savedLang = localStorage.getItem('threadborn_lang');
        if (!savedLang) return;
        var path = window.location.pathname;
        var isJp = path.indexOf('-jp') !== -1;
        
        if (savedLang === 'ja' && !isJp) {
          if (path === '/' || path === '/index' || path === '/index.html') {
            window.location.replace('./index-jp.html');
          } else if (path.indexOf('.html') !== -1) {
            window.location.replace(path.replace('.html', '-jp.html'));
          } else {
            window.location.replace(path + '-jp');
          }
        } else if (savedLang === 'en' && isJp) {
          if (path.indexOf('-jp.html') !== -1) {
            window.location.replace(path.replace('-jp.html', '.html'));
          } else {
            window.location.replace(path.replace('-jp', ''));
          }
        }
      } catch(e) {}
    })();
  </script>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Threadborn Sign Up</title>
  
  <link rel="stylesheet" href="./global.css" />
</head>
<body>
  <main class="auth-shell">
    <h1 style="font-family: 'Cormorant Garamond', serif; font-size: 32px; margin-top: 0;">Sign Up</h1>
    <p style="color: var(--mist); margin-bottom: 24px;">Create your Threadborn account and avatar.</p>
    <form id="signup-form" style="text-align: left;">
      <label for="username">Username</label>
      <input id="username" class="input-field" name="username" required maxlength="24" pattern="[A-Za-z0-9_]{3,24}" />
      <label for="email">Email</label>
      <input id="email" class="input-field" name="email" type="email" required autocomplete="email" />
      <label for="password">Password</label>
      <input id="password" class="input-field" name="password" type="password" required autocomplete="new-password" minlength="6" />
      <label for="avatar">Profile picture</label>
      <input id="avatar" class="input-field" name="avatar" type="file" accept="image/*" style="padding: 10px;" />
      <img id="avatar-preview" class="avatar-preview" alt="Avatar preview" style="display: block; margin-bottom: 18px; max-width: 96px; border-radius: 50%;" />
      <button id="submit-btn" class="btn-form" type="submit">Create Account</button>
    </form>
    <div id="status" class="status" aria-live="polite"></div>
    <div class="back" style="margin-top: 24px;">
      <a href="./login.html" class="back-link" style="margin-top: 0;">Have an account? Login</a> ·
      <a href="./index.html" class="back-link" style="margin-top: 0;">Back to Reader</a>
    </div>
  </main>
  <script src="./runtime-config.js"></script>
  <script>
    function resolveApiBase() {
      const configured = (window.__THREADBORN_API_BASE || localStorage.getItem("threadborn_api_base") || "").replace(/\/$/, "");
      if (configured) {
        return configured;
      }
      const host = window.location.hostname;
      if (host === "appassets.androidplatform.net") {
        return "https://threadborn.vercel.app";
      }
      return "";
    }

    const API_BASE = resolveApiBase();
    const ACTIVE_USER_KEY = "threadborn_user";
    const form = document.getElementById("signup-form");
    const statusEl = document.getElementById("status");
    const submitBtn = document.getElementById("submit-btn");
    const avatarInput = document.getElementById("avatar");
    const avatarPreview = document.getElementById("avatar-preview");
    let avatarDataUrl = "";

    function setStatus(message, type) {
      statusEl.textContent = message || "";
      statusEl.className = "status" + (type ? " " + type : "");
    }

    function normalizeAuthError(message) {
      const text = String(message || "");
      if (text.includes("Missing DATABASE_URL")) {
        return "Server is not configured yet. Please set DATABASE_URL in Vercel Production env vars.";
      }
      return text || "Signup failed.";
    }

    avatarInput.addEventListener("change", () => {
      const file = avatarInput.files && avatarInput.files[0];
      if (!file) {
        avatarDataUrl = "";
        avatarPreview.removeAttribute("src");
        return;
      }
      const reader = new FileReader();
      reader.onload = () => {
        avatarDataUrl = String(reader.result || "");
        avatarPreview.src = avatarDataUrl;
      };
      reader.readAsDataURL(file);
    });

    form.addEventListener("submit", async event => {
      event.preventDefault();
      setStatus("");
      submitBtn.disabled = true;
      submitBtn.textContent = "Creating...";

      const payload = {
        username: form.username.value.trim(),
        email: form.email.value.trim().toLowerCase(),
        password: form.password.value,
        avatarUrl: avatarDataUrl
      };

      try {
        const response = await fetch(`${API_BASE}/api/auth/signup`, {
          method: "POST",
          credentials: "include",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(payload)
        });
        const result = await response.json();

        if (response.ok && result.success) {
          localStorage.setItem("threadborn_csrf_token", result.data.csrfToken || "");
          localStorage.setItem(ACTIVE_USER_KEY, JSON.stringify({
            id: result.data.user.id,
            email: result.data.user.email,
            displayName: result.data.user.username,
            avatarUrl: result.data.user.avatarUrl,
            verified: result.data.user.verified,
            role: result.data.user.role
          }));
          setStatus("Account created. Redirecting...", "ok");
          setTimeout(() => { window.location.href = "./index.html"; }, 700);
          return;
        }

        setStatus(normalizeAuthError(result.error), "error");
      } catch (error) {
        setStatus("Could not reach server. Try again.", "error");
      } finally {
        submitBtn.disabled = false;
        submitBtn.textContent = "Create Account";
      }
    });
  </script>
</body>
</html>
