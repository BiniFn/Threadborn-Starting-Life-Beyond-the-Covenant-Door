<!DOCTYPE html>
<html lang="en">
<head>
  <script>
    (function() {
      try {
        var savedLang = localStorage.getItem('threadborn_lang');
        if (!savedLang) return;
        var path = window.location.pathname;
        var isJp = path.indexOf('-jp') !== -1;
        
        if (savedLang === 'ja' && !isJp) {
          if (path === '/' || path === '/index' || path === '/index.html') {
            window.location.replace('./index-jp.html');
          } else if (path.indexOf('.html') !== -1) {
            window.location.replace(path.replace('.html', '-jp.html'));
          } else {
            window.location.replace(path + '-jp');
          }
        } else if (savedLang === 'en' && isJp) {
          if (path.indexOf('-jp.html') !== -1) {
            window.location.replace(path.replace('-jp.html', '.html'));
          } else {
            window.location.replace(path.replace('-jp', ''));
          }
        }
      } catch(e) {}
    })();
  </script>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Threadborn Login</title>
  <link rel="icon" type="image/png" href="./assets/threadborn-favicon.png" />
  <link rel="apple-touch-icon" href="./assets/threadborn-apple-touch.png" />
  
  <link rel="stylesheet" href="./global.css?v=32" />
</head>
<body>
  <main class="auth-shell">
    <h1 style="font-family: 'Cormorant Garamond', serif; font-size: 32px; margin-top: 0;">Login</h1>
    <p style="color: var(--mist); margin-bottom: 24px;">Sign in with your Threadborn account.</p>

    <form id="login-form">
      <label for="email">Email</label>
      <input id="email" class="input-field" name="email" type="email" required autocomplete="email" />

      <label for="password">Password</label>
      <input id="password" class="input-field" name="password" type="password" required autocomplete="current-password" />

      <button id="submit-btn" class="btn-form" type="submit" style="margin-top: 10px;">Sign In</button>
    </form>

    <div id="status" class="status" aria-live="polite"></div>
    <div class="back" style="margin-top: 24px;">
      <a href="./signup.html" class="back-link" style="margin-top: 0;">Create account</a> · <a href="./index.html" class="back-link" style="margin-top: 0;">Back to Reader</a>
    </div>
  </main>

  <script src="./runtime-config.js"></script>
  <script>
    function resolveApiBase() {
      const configured = (window.__THREADBORN_API_BASE || localStorage.getItem("threadborn_api_base") || "").replace(/\/$/, "");
      if (configured) {
        return configured;
      }
      const host = window.location.hostname;
      if (host === "appassets.androidplatform.net" || window.location.protocol === "file:") {
        return "https://threadborn.vercel.app";
      }
      return "";
    }

    const API_BASE = resolveApiBase();
    const APP_SESSION_KEY = "threadborn_app_session";

    function getAppMode() {
      return String(window.__THREADBORN_APP_MODE || localStorage.getItem("threadborn_app_mode") || "").trim().toLowerCase();
    }

    function authHeaders() {
      const headers = { "Content-Type": "application/json" };
      const appMode = getAppMode();
      const appSession = localStorage.getItem(APP_SESSION_KEY) || "";
      if (appMode) {
        headers["X-Threadborn-App-Mode"] = appMode;
        localStorage.setItem("threadborn_app_mode", appMode);
      }
      if (appSession) {
        headers.Authorization = `Bearer ${appSession}`;
      }
      return headers;
    }

    function saveAuthSession(data) {
      localStorage.setItem("threadborn_csrf_token", data.csrfToken || "");
      if (data.sessionToken) {
        localStorage.setItem(APP_SESSION_KEY, data.sessionToken);
      }
    }

    const form = document.getElementById("login-form");
    const submitBtn = document.getElementById("submit-btn");
    const statusEl = document.getElementById("status");

    function setStatus(message, type) {
      statusEl.textContent = message || "";
      statusEl.className = "status" + (type ? " " + type : "");
    }

    function normalizeAuthError(message) {
      const text = String(message || "");
      if (text.includes("Missing DATABASE_URL")) {
        return "Server is not configured yet. Please set DATABASE_URL in Vercel Production env vars.";
      }
      return text || "Login failed.";
    }

    form.addEventListener("submit", async event => {
      event.preventDefault();
      setStatus("");
      submitBtn.disabled = true;
      submitBtn.textContent = "Signing in...";

      const payload = {
        email: form.email.value.trim(),
        password: form.password.value
      };

      try {
        const response = await fetch(`${API_BASE}/api/auth/login`, {
          method: "POST",
          credentials: "include",
          headers: authHeaders(),
          body: JSON.stringify(payload)
        });
        const result = await response.json();
        if (!response.ok || !result.success) {
          setStatus(normalizeAuthError(result.error), "error");
          return;
        }
        saveAuthSession(result.data);
        localStorage.setItem("threadborn_user", JSON.stringify({
          id: result.data.user.id,
          email: result.data.user.email,
          displayName: result.data.user.username,
          avatarUrl: result.data.user.avatarUrl,
          verified: result.data.user.verified,
          role: result.data.user.role
        }));
        setStatus("Login successful. Redirecting...", "ok");
        window.setTimeout(() => {
          window.location.href = "./index.html";
        }, 700);
      } catch (error) {
        setStatus("Could not reach server. Please try again.", "error");
      } finally {
        submitBtn.disabled = false;
        submitBtn.textContent = "Sign In";
      }
    });
  </script>
</body>
</html>
