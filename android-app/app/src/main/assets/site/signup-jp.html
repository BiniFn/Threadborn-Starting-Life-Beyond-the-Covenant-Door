<!DOCTYPE html>
<html lang="ja">
<head>
  <script>
    (function() {
      try {
        var savedLang = localStorage.getItem('threadborn_lang');
        if (!savedLang) return;
        var path = window.location.pathname;
        var isJp = path.indexOf('-jp') !== -1;
        
        if (savedLang === 'ja' && !isJp) {
          if (path === '/' || path === '/index' || path === '/index.html') {
            window.location.replace('./index-jp.html');
          } else if (path.indexOf('.html') !== -1) {
            window.location.replace(path.replace('.html', '-jp.html'));
          } else {
            window.location.replace(path + '-jp');
          }
        } else if (savedLang === 'en' && isJp) {
          if (path.indexOf('-jp.html') !== -1) {
            window.location.replace(path.replace('-jp.html', '.html'));
          } else {
            window.location.replace(path.replace('-jp', ''));
          }
        }
      } catch(e) {}
    })();
  </script>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Threadborn Sign Up</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #07090f;
      --card: #111521;
      --text: #eef3ff;
      --muted: #99a4bf;
      --accent: #6da8ff;
      --danger: #ff7d7d;
      --border: rgba(255, 255, 255, 0.14);
    }
    * { box-sizing: border-box; font-family: Inter, system-ui, -apple-system, Segoe UI, sans-serif; }
    body {
      margin: 0;
      min-height: 100vh;
      background: radial-gradient(circle at top, #1a2440, var(--bg) 52%);
      color: var(--text);
      display: grid;
      place-items: center;
      padding: 24px;
    }
    .card {
      width: min(100%, 460px);
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 24px;
      box-shadow: 0 18px 36px rgba(0, 0, 0, 0.32);
    }
    h1 { margin: 0 0 8px; font-size: 1.5rem; }
    p { margin: 0 0 18px; color: var(--muted); }
    label { display: block; margin-bottom: 8px; font-size: 0.92rem; color: var(--muted); }
    input {
      width: 100%;
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 11px 12px;
      margin-bottom: 14px;
      background: #0a0f1c;
      color: var(--text);
      outline: none;
    }
    input:focus { border-color: var(--accent); }
    button {
      width: 100%;
      border: 0;
      border-radius: 10px;
      padding: 12px 14px;
      font-size: 0.95rem;
      font-weight: 600;
      background: var(--accent);
      color: #071427;
      cursor: pointer;
    }
    .avatar-preview {
      width: 62px;
      height: 62px;
      border-radius: 50%;
      border: 1px solid var(--border);
      object-fit: cover;
      background: #0a0f1c;
      margin: 6px 0 14px;
    }
    .status { min-height: 22px; margin-top: 14px; font-size: 0.92rem; color: var(--muted); }
    .status.error { color: var(--danger); }
    .status.ok { color: #89e79e; }
    .back { margin-top: 16px; text-align: center; }
    .back a { color: var(--accent); text-decoration: none; }
  </style>
</head>
<body>
  <main class="card">
    <h1>サインアップ</h1>
    <p>Create your Threadborn account and avatar.</p>
    <form id="signup-form">
      <label for="username">Username</label>
      <input id="username" name="username" required maxlength="24" pattern="[A-Za-z0-9_]{3,24}" />
      <label for="email">Email</label>
      <input id="email" name="email" type="email" required autocomplete="email" />
      <label for="password">Password</label>
      <input id="password" name="password" type="password" required autocomplete="new-password" minlength="6" />
      <label for="avatar">Profile picture</label>
      <input id="avatar" name="avatar" type="file" accept="image/*" />
      <img id="avatar-preview" class="avatar-preview" alt="Avatar preview" />
      <button id="submit-btn" type="submit">Create Account</button>
    </form>
    <div id="status" class="status" aria-live="polite"></div>
    <div class="back">
      <a href="./login.html">Have an account? Login</a> ·
      <a href="./index.html">Back to Reader</a>
    </div>
  </main>
  <script src="./runtime-config.js"></script>
  <script>
    function resolveApiBase() {
      const configured = (window.__THREADBORN_API_BASE || localStorage.getItem("threadborn_api_base") || "").replace(/\/$/, "");
      if (configured) {
        return configured;
      }
      const host = window.location.hostname;
      if (host === "appassets.androidplatform.net") {
        return "https://threadborn.vercel.app";
      }
      return "";
    }

    const API_BASE = resolveApiBase();
    const ACTIVE_USER_KEY = "threadborn_user";
    const form = document.getElementById("signup-form");
    const statusEl = document.getElementById("status");
    const submitBtn = document.getElementById("submit-btn");
    const avatarInput = document.getElementById("avatar");
    const avatarPreview = document.getElementById("avatar-preview");
    let avatarDataUrl = "";

    function setStatus(message, type) {
      statusEl.textContent = message || "";
      statusEl.className = "status" + (type ? " " + type : "");
    }

    function normalizeAuthError(message) {
      const text = String(message || "");
      if (text.includes("Missing DATABASE_URL")) {
        return "Server is not configured yet. Please set DATABASE_URL in Vercel Production env vars.";
      }
      return text || "Signup failed.";
    }

    avatarInput.addEventListener("change", () => {
      const file = avatarInput.files && avatarInput.files[0];
      if (!file) {
        avatarDataUrl = "";
        avatarPreview.removeAttribute("src");
        return;
      }
      const reader = new FileReader();
      reader.onload = () => {
        avatarDataUrl = String(reader.result || "");
        avatarPreview.src = avatarDataUrl;
      };
      reader.readAsDataURL(file);
    });

    form.addEventListener("submit", async event => {
      event.preventDefault();
      setStatus("");
      submitBtn.disabled = true;
      submitBtn.textContent = "Creating...";

      const payload = {
        username: form.username.value.trim(),
        email: form.email.value.trim().toLowerCase(),
        password: form.password.value,
        avatarUrl: avatarDataUrl
      };

      try {
        const response = await fetch(`${API_BASE}/api/auth/signup`, {
          method: "POST",
          credentials: "include",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(payload)
        });
        const result = await response.json();

        if (response.ok && result.success) {
          localStorage.setItem("threadborn_csrf_token", result.data.csrfToken || "");
          localStorage.setItem(ACTIVE_USER_KEY, JSON.stringify({
            id: result.data.user.id,
            email: result.data.user.email,
            displayName: result.data.user.username,
            avatarUrl: result.data.user.avatarUrl,
            verified: result.data.user.verified,
            role: result.data.user.role
          }));
          setStatus("Account created. Redirecting...", "ok");
          setTimeout(() => { window.location.href = "./index.html"; }, 700);
          return;
        }

        setStatus(normalizeAuthError(result.error), "error");
      } catch (error) {
        setStatus("Could not reach server. Try again.", "error");
      } finally {
        submitBtn.disabled = false;
        submitBtn.textContent = "Create Account";
      }
    });
  </script>
</body>
</html>
