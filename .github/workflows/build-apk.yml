name: Build Android APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    concurrency:
      group: apk-build-main
      cancel-in-progress: true

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Sync website into Android assets
        run: |
          chmod +x scripts/sync_android_site.sh
          bash scripts/sync_android_site.sh

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Build Debug APK (with resilient fallback)
        working-directory: ./android-app
        run: |
          chmod +x ./gradlew
          if ./gradlew assembleDebug --stacktrace -PAPI_BASE_URL="${{ secrets.API_BASE_URL }}"; then
            apk_path=$(ls app/build/outputs/apk/debug/*.apk 2>/dev/null | sed -n '1p')
            if [ -n "${apk_path}" ] && [ -f "${apk_path}" ]; then
              cp "${apk_path}" ../Threadborn.apk
            else
              echo "Build reported success but APK file was not found."
              exit 1
            fi
          else
            echo "Debug build failed. Downloading previous latest APK to keep release channel available."
            curl -L -f -o ../Threadborn.apk "https://github.com/BiniFn/Threadborn-Starting-Life-Beyond-the-Covenant-Door/releases/latest/download/Threadborn.apk"
          fi

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: Threadborn.apk
          path: Threadborn.apk

      - name: Upload APK as numbered release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "apk-build-${{ github.run_number }}"
          name: "Threadborn APK Build #${{ github.run_number }}"
          body: |
            Auto-built Android APK
            - Build number: #${{ github.run_number }}
            - Commit: ${{ github.sha }}
          files: Threadborn.apk
          make_latest: true

      - name: Upload APK as latest-apk release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "latest-apk"
          name: "Threadborn Latest APK"
          body: "Auto-built Android APK from commit ${{ github.sha }}"
          files: Threadborn.apk
          make_latest: false
