name: Build Android APK

on:
  push:
    branches:
      - main
    paths:
      - 'index.html'
      - 'manifest.json'
      - 'service-worker.js'
      - 'assets/**'
      - 'android-app/**'
      - 'scripts/**'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Sync website into Android assets
        run: |
          chmod +x scripts/sync_android_site.sh
          bash scripts/sync_android_site.sh

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Generate Gradle Wrapper
        working-directory: ./android-app
        run: gradle wrapper --gradle-version 8.7

      - name: Build Release APK
        working-directory: ./android-app
        run: ./gradlew assembleRelease

      - name: Prepare APK asset
        run: cp android-app/app/build/outputs/apk/release/app-release.apk Threadborn.apk

      - name: Upload APK as Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "apk-build-${{ github.run_number }}"
          name: "Threadborn APK Build #${{ github.run_number }}"
          body: "Auto-built Android APK from commit ${{ github.sha }}"
          files: Threadborn.apk
          make_latest: true
