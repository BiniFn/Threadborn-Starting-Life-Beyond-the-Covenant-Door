name: Build Apps

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-apk:
    runs-on: ubuntu-latest
    concurrency:
      group: apk-build-main
      cancel-in-progress: true

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Sync website into assets
        run: |
          chmod +x scripts/sync-all.sh
          bash scripts/sync-all.sh

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Build Debug APK
        working-directory: ./android-app
        run: |
          chmod +x ./gradlew
          ./gradlew assembleDebug --stacktrace -PAPI_BASE_URL="${{ secrets.API_BASE_URL }}"
          apk_path=$(ls app/build/outputs/apk/debug/*.apk 2>/dev/null | sed -n '1p')
          if [ -n "${apk_path}" ] && [ -f "${apk_path}" ]; then
            cp "${apk_path}" ../threadborn.apk
          else
            echo "Build reported success but APK file was not found."
            exit 1
          fi

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: threadborn-apk
          path: threadborn.apk

  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Sync site
        shell: bash
        run: |
          bash scripts/sync-all.sh

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r desktop-app/requirements.txt pywin32

      - name: Build Windows app
        run: python desktop-app/build.py

      - name: Package Windows build
        shell: bash
        run: |
          cd dist
          7z a -tzip windows.zip Threadborn.exe

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-zip
          path: dist/windows.zip

  build-macos:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Sync site
        run: |
          chmod +x scripts/sync-all.sh
          ./scripts/sync-all.sh

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r desktop-app/requirements.txt pyobjc-core pyobjc-framework-Cocoa

      - name: Build macOS app
        run: python desktop-app/build.py

      - name: Package macOS build
        run: ditto -c -k --sequesterRsrc --keepParent dist/Threadborn.app dist/mac-os.zip

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-zip
          path: dist/mac-os.zip

  release:
    runs-on: ubuntu-latest
    needs: [build-apk, build-windows, build-macos]

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts

      - name: Publish combined release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "latest-apps"
          name: "ThreadBorn Apps"
          body: "Auto-built Windows, macOS, and Android packages from commit ${{ github.sha }}"
          make_latest: true
          files: |
            release-artifacts/threadborn-apk/threadborn.apk
            release-artifacts/windows-zip/windows.zip
            release-artifacts/macos-zip/mac-os.zip
