name: Build Desktop Apps

on:
  push:
    branches:
      - main
    paths:
      - '*.html'
      - 'runtime-config.js'
      - 'assets/**'
      - 'manifest.json'
      - 'service-worker.js'
      - 'desktop-app/**'
      - 'scripts/sync_desktop_site.sh'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Sync site
        shell: bash
        run: |
          bash scripts/sync_desktop_site.sh

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r desktop-app/requirements.txt pywin32

      - name: Build Windows app
        run: python desktop-app/build.py

      - name: Package Windows build
        shell: bash
        run: |
          cd dist
          7z a -tzip Threadborn-Windows.zip Threadborn/*

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: Threadborn-Windows
          path: dist/Threadborn-Windows.zip

  build-macos:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Sync site
        run: |
          chmod +x scripts/sync_desktop_site.sh
          ./scripts/sync_desktop_site.sh

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r desktop-app/requirements.txt pyobjc-core pyobjc-framework-Cocoa

      - name: Build macOS app
        run: python desktop-app/build.py

      - name: Package macOS build
        run: ditto -c -k --sequesterRsrc --keepParent dist/Threadborn.app dist/Threadborn-macOS.zip

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: Threadborn-macOS
          path: dist/Threadborn-macOS.zip

  release:
    runs-on: ubuntu-latest
    needs: [build-windows, build-macos]

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts

      - name: Publish desktop release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "desktop-build-${{ github.run_number }}"
          name: "Threadborn Desktop Build #${{ github.run_number }}"
          body: "Auto-built Windows and macOS desktop packages from commit ${{ github.sha }}"
          make_latest: true
          files: |
            release-artifacts/Threadborn-Windows/Threadborn-Windows.zip
            release-artifacts/Threadborn-macOS/Threadborn-macOS.zip
